# Visualization with grafana

location /visualization/ {
    proxy_set_header Host $http_host;
    proxy_pass http://visualization.:3000;
}

# Proxy Grafana Live WebSocket connections.
location /visualization/api/live/ {
    rewrite  ^/visualization/(.*)  /$1 break;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_pass http://visualization.:3000/api/live/;
}

# Object storage with minio
location /object-storage/ {
    proxy_pass http://object-storage.:9001;
    rewrite   ^/object-storage/(.*) /$1 break;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;

    # To support websocket
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

location /sta/ {
    proxy_pass http://frost.:8080/;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Access-Control-Allow-Origin *;
    proxy_redirect off;
    proxy_read_timeout 120s;
}

# ============================================
# Hydro Portal
# Proxies /portal/ to water-dp-frontend container
# Next.js is configured with basePath: '/portal'
# so the prefix must be preserved (no rewrite)
# ============================================
location /portal/ {
    resolver 10.89.2.1 valid=30s;
    set $portal_upstream "water-dp-frontend:3000";
    proxy_pass http://$portal_upstream;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
}

# Also handle /portal without trailing slash (avoid redirect loop with Next.js basePath)
location = /portal {
    resolver 10.89.2.1 valid=30s;
    set $portal_upstream "water-dp-frontend:3000";
    proxy_pass http://$portal_upstream;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
}

# ============================================
# GeoServer Integration
# Proxies /geoserver/ to water-dp-geoserver container
# ============================================
location /geoserver/ {
    resolver 10.89.2.1 valid=30s;
    set $geoserver_upstream "water-dp-geoserver:8080";
    proxy_pass http://$geoserver_upstream$uri$is_args$args;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
}

location /keycloak/ {

    proxy_pass http://keycloak.:8081/keycloak/;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    proxy_http_version 1.1;
    proxy_redirect off;
}

# ============================================
# water_dp-api - Water Data Platform API
# Proxies /water-api/ to water-dp-api container
# ============================================
location /water-api/ {
    resolver 10.89.2.1 valid=30s;
    set $api_upstream "water-dp-api:8000";
    rewrite ^/water-api/(.*)$ /$1 break;
    proxy_pass http://$api_upstream;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    
    # Pass authorization headers
    proxy_set_header Authorization $http_authorization;
    proxy_pass_header Authorization;
    
    # WebSocket support (for real-time updates if needed)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    
    proxy_redirect off;
    proxy_read_timeout 120s;
}