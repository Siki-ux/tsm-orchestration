# this is required to proxy Grafana Live WebSocket connections.
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}


server {

    listen       80;
    listen  [::]:80;

    server_name hydroportal-dev.dataraptors.eu;

    return 301 https://$host$request_uri;
}

server {

    listen       443 ssl;
    listen  [::]:443 ssl;

    server_name hydroportal-dev.dataraptors.eu;

    ssl_certificate     /etc/ssl/public.crt;
    ssl_certificate_key /etc/ssl/private.key;

    # Auth.js session token cookies are large (~8KB split across multiple cookies)
    large_client_header_buffers 8 32k;

    location = / {
        return 301 /portal/;
    }

    error_page 404 /not_found.html;
    location = /custom_404.html {
            root /usr/share/nginx/html;
            internal;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    resolver 127.0.0.11 valid=30s;
    include locations/locations.conf;

}

server {

    listen       9000 ssl;
    listen  [::]:9000 ssl;

    ssl_certificate     /etc/ssl/public.crt;
    ssl_certificate_key /etc/ssl/private.key;

    # Allow special characters in headers
    ignore_invalid_headers off;
    # Allow any size file to be uploaded.
    # Set to a value such as 1000m; to restrict file size to a specific value
    client_max_body_size 1000m;
    # Disable buffering
    proxy_buffering off;
    proxy_request_buffering off;

    include locations/locations.9000.conf;

}